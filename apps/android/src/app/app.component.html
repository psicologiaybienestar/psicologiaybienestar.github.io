<ion-app>
  <ion-tabs>
    <ion-router-outlet></ion-router-outlet>

    <ion-tab-bar slot="bottom">
      <ion-tab-button tab="inicio" routerLink="/inicio" routerLinkActive="tab-selected">
        <ion-icon name="home" />
        <ion-label>Inicio</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="agenda" routerLink="/agenda" routerLinkActive="tab-selected">
        <ion-icon name="calendar" />
        <ion-label>Agenda</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="emociones" routerLink="/emociones" routerLinkActive="tab-selected">
        <ion-icon name="heart" />
        <ion-label>Emociones</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="minijuegos" routerLink="/minijuegos" routerLinkActive="tab-selected">
        <ion-icon name="game-controller" />
        <ion-label>Juegos</ion-label>
      </ion-tab-button>

      <ion-tab-button tab="configuracion" routerLink="/configuracion" routerLinkActive="tab-selected">
        <ion-icon name="settings" />
        <ion-label>Más</ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-app>
